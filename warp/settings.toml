[appearance.themes]
selected_system_themes = {
  dark = { custom = { name = "Air-dark", path = "/Users/fg/.warp/themes/air-dark.yaml" } },
  light = { custom = { name = "Air-light", path = "/Users/fg/.warp/themes/air-light.yaml" } },
}
system_theme = true

[appearance.tabs]

[appearance.tabs.header_toolbar_chip_selection]

[appearance.tabs.header_toolbar_chip_selection.custom]
left = ["tabs_panel", "tools_panel", "agent_management"]
right = ["code_review", "notifications_mailbox"]

[appearance.text]
notebook_font_size = 14.0
font_size = 13.0

[appearance.vertical_tabs]
enabled = true

[privacy]
telemetry_enabled = false

[terminal]

[terminal.input]
input_box_type_setting = "universal"

[notifications]
toast_duration_secs = 8

[notifications.preferences]
is_agent_task_completed_enabled = true
is_long_running_enabled = true
is_needs_attention_enabled = true
is_password_prompt_enabled = true
long_running_threshold = 30
mode = "enabled"
play_notification_sound = true
