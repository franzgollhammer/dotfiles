unbind r
bind r source-file ~/.tmux.conf

# bell passthrough for notifications
set -g bell-action any
set -g monitor-bell on
set -g allow-passthrough on

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# performance & correctness
set -sg escape-time 0
set -g focus-events on
set -g history-limit 50000
set -g renumber-windows on
set -g display-time 3000

# status bar
set -g status-style 'bg=default fg=#888888'
set -g status-position top
set -g status-interval 5
set -g status-left '#[fg=yellow bold][#S] '
set -g status-left-length 32
set -g status-right-length 80
set -g status-right '#[fg=magenta bold][#(cd #{pane_current_path}; git branch --show-current 2>/dev/null || echo "no-git")]#[fg=cyan bold][#H]#[fg=yellow bold][%Y-%m-%d %H:%M]'
setw -g window-status-format '#[fg=yellow]#I#[fg=#888888]:#W#F'
setw -g window-status-current-format '#[fg=yellow bold]#I#[fg=green bold]:#W#F'

# set status bar 2 for empty line below main status bar
# set -Fg 'status-format[1]' '#{status-format[0]}'
# set -g 'status-format[1]' ''
# set -g status 2

set -g pane-border-lines heavy

set -g set-clipboard on
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
setw -g aggressive-resize on
setw -g automatic-rename on

# vim keys for pane switching
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# prefix-free pane switching with Ctrl+Arrow
bind -n C-Left select-pane -L
bind -n C-Down select-pane -D
bind -n C-Up select-pane -U
bind -n C-Right select-pane -R

# resize panes
bind -n S-Left resize-pane -L 5
bind -n S-Down resize-pane -D 5
bind -n S-Up resize-pane -U 5
bind -n S-Right resize-pane -R 5

# alternate between sessions
bind a switch-client -l

# double tap C-b to toggle last window
bind C-b last-window

# next/prev window
bind C-n next-window
bind C-p previous-window

# Copy mode
bind V copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

# remove confirm step when killing a window or pane
# bind & kill-window
bind x kill-pane

# Open a new pane or window with the current directory of the current pane,
# not the directory in which the first tmux session was started.
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Additional pane/window management
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind , command-prompt "rename-window '%%'"
bind X kill-pane -a

# Session management
bind -n MouseUp1StatusLeft choose-tree -Zs
bind S choose-session
bind N new-session
bind D detach-client
bind ) switch-client -n
bind ( switch-client -p


# run custom scripts/commands
bind t run-shell "tmux neww tmux_worktree"
bind v neww -c "#{pane_current_path}" "nvim $DOTFILES"
bind f run-shell "tmux neww tmux_session"
bind g neww -c "#{pane_current_path}" lazygit

# New utility bindings
bind q run-shell "tmux_quick_window"
bind L run-shell "tmux_list"
bind C run-shell "tmux_cleanup"
bind R run-shell "tmux_rename"

# Right-click menus as normal click menus (open on click, click an item to choose)
# instead of the default hold-drag-release. These are tmux's built-in default
# menus with `-O` added to display-menu. Regenerate after a major tmux upgrade with:
#   tmux list-keys | grep -E "MouseDown3(Pane|Status|StatusLeft) " | grep -v M-MouseDown3 \
#     | sed -E 's/^bind-key +-T root +/bind -n /; s/display-menu /display-menu -O /'
bind -n MouseDown3Pane            if-shell -F -t = "#{||:#{mouse_any_flag},#{&&:#{pane_in_mode},#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}}}" { select-pane -t = ; send-keys -M } { display-menu -O -T "#[align=centre]#{pane_index} (#{pane_id})" -t = -x M -y M "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Top,}" < { send-keys -X history-top } "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Bottom,}" > { send-keys -X history-bottom } '' "#{?#{&&:#{buffer_size},#{!:#{pane_in_mode}}},Paste #[underscore]#{=/9/...:buffer_sample},}" p { paste-buffer } '' "#{?mouse_word,Search For #[underscore]#{=/9/...:mouse_word},}" C-r { if-shell -F "#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}" "copy-mode -t=" ; send-keys -X -t = search-backward -- "#{q:mouse_word}" } "#{?mouse_word,Type #[underscore]#{=/9/...:mouse_word},}" C-y { copy-mode -q ; send-keys -l "#{q:mouse_word}" } "#{?mouse_word,Copy #[underscore]#{=/9/...:mouse_word},}" c { copy-mode -q ; set-buffer "#{q:mouse_word}" } "#{?mouse_line,Copy Line,}" l { copy-mode -q ; set-buffer "#{q:mouse_line}" } '' "#{?mouse_hyperlink,Type #[underscore]#{=/9/...:mouse_hyperlink},}" C-h { copy-mode -q ; send-keys -l "#{q:mouse_hyperlink}" } "#{?mouse_hyperlink,Copy #[underscore]#{=/9/...:mouse_hyperlink},}" h { copy-mode -q ; set-buffer "#{q:mouse_hyperlink}" } '' "#{?#{!:#{pane_floating_flag}},Horizontal Split,}" h { split-window -h } "#{?#{!:#{pane_floating_flag}},Vertical Split,}" v { split-window -v } '' "#{?#{&&:#{!:#{pane_floating_flag}},#{>:#{window_panes},1}},Swap Up,}" u { swap-pane -U } "#{?#{&&:#{!:#{pane_floating_flag}},#{>:#{window_panes},1}},Swap Down,}" d { swap-pane -D } "#{?pane_marked_set,,-}Swap Marked" s { swap-pane } '' Kill X { kill-pane } Respawn R { respawn-pane -k } "#{?pane_marked,Unmark,Mark}" m { select-pane -m } "#{?#{>:#{window_panes},1},,-}#{?window_zoomed_flag,Unzoom,Zoom}" z { resize-pane -Z } }
bind -n MouseDown3Status          display-menu -O -T "#[align=centre]#{window_index}:#{window_name}" -t = -x W -y W "#{?#{>:#{session_windows},1},,-}Swap Left" l { swap-window -t :-1 } "#{?#{>:#{session_windows},1},,-}Swap Right" r { swap-window -t :+1 } "#{?pane_marked_set,,-}Swap Marked" s { swap-window } '' Kill X { kill-window } Respawn R { respawn-window -k } "#{?pane_marked,Unmark,Mark}" m { select-pane -m } Rename n { command-prompt -F -I "#W" { rename-window -t "#{window_id}" "%%" } } '' "New After" w { new-window -a } "New At End" W { new-window }
bind -n MouseDown3StatusLeft      display-menu -O -T "#[align=centre]#{session_name}" -t = -x M -y W Next n { switch-client -n } Previous p { switch-client -p } '' Renumber N { move-window -r } Rename r { command-prompt -I "#S" { rename-session "%%" } } Detach d { detach-client } '' "New Session" s { new-session } "New Window" w { new-window }

