# herdr configuration
# Synced to ~/.config/herdr/config.toml by scripts/build_symlinks.

onboarding = false

[theme]
# Follow the ANSI palette of the host terminal.
name = "terminal"
auto_switch = false

[terminal]
# Use a login shell on macOS and inherit the source pane's directory.
shell_mode = "auto"
new_cwd = "follow"

[keys]
# Keep the tmux prefix and its core pane/tab navigation.
prefix = "ctrl+b"
new_tab = "prefix+c"
previous_tab = "prefix+p"
next_tab = "prefix+n"
focus_pane_left = ["prefix+h", "ctrl+left"]
focus_pane_down = ["prefix+j", "ctrl+down"]
focus_pane_up = ["prefix+k", "ctrl+up"]
focus_pane_right = ["prefix+l", "ctrl+right"]
copy_mode = ["prefix+[", "prefix+shift+v"]
split_vertical = "prefix+v"
split_horizontal = "prefix+minus"
close_pane = "prefix+x"
zoom = "prefix+z"

# Vim-style movement inside Herdr's navigate mode.
navigate_pane_left = "h"
navigate_pane_down = "j"
navigate_pane_up = "k"
navigate_pane_right = "l"

[worktrees]
directory = "~/dev/worktrees"

[ui]
mouse_capture = true
copy_on_select = true
confirm_close = false
prompt_new_tab_name = false
pane_borders = true
pane_gaps = false

[ui.toast]
# Match the desktop notifications enabled in Ghostty and Warp.
delivery = "system"
delay_seconds = 1

[ui.sound]
enabled = true

[session]
resume_agents_on_restore = true

[experimental]
# Pane history may contain sensitive terminal output; keep it out of persisted state.
pane_history = false

[advanced]
scrollback_limit_bytes = 10000000
